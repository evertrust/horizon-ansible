[tools]
uv = "0.11.28"
python = "3.10"
"aqua:anchore/grype" = "0.112.0"
"aqua:anchore/syft" = "1.44.0"

[env]
_.python.venv = { path = ".venv", create = true }

[settings]
experimental = true
python.uv_venv_auto = "create|source"

[tasks.sbom]
description = "Generate a Syft JSON SBOM for a filesystem path or container image"
usage = '''
arg "<source>" help="Filesystem path or container image reference to scan"
flag "-o --output <file>" help="SBOM output file" default="horizon-ansible-sbom.syft.json"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

syft scan "${usage_source:?}" -o "syft-json=${usage_output:?}"
'''

[tasks."scan:sbom"]
description = "Scan vulnerabilities from a Syft JSON SBOM using Grype"
usage = '''
arg "<sbom>" help="Syft JSON SBOM file to scan"
flag "--fail-on <severity>" help="Fail when vulnerability severity is at least this level" default="high"
flag "-o --output <file>" help="Grype SARIF output file" default="grype-horizon-ansible.sarif"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

grype "sbom:${usage_sbom:?}" --by-cve --fail-on "${usage_fail_on:?}" \
  -o "sarif=${usage_output:?}" \
  -o table
'''

[tasks."scan:sbom-vex"]
description = "Scan vulnerabilities from a Syft JSON SBOM using Grype and an OpenVEX document"
usage = '''
arg "<sbom>" help="Syft JSON SBOM file to scan"
flag "-o --output <file>" help="Grype JSON output file" default="grype-horizon-ansible-vex.json"
flag "--vex <file>" help="OpenVEX document to apply" default="/home/runner/.vex/openvex.json"
flag "--fail-on <severity>" help="Fail when vulnerability severity is at least this level" default="high"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

grype "sbom:${usage_sbom:?}" --by-cve --vex "${usage_vex:?}" --fail-on "${usage_fail_on:?}" \
  -o "json=${usage_output:?}" \
  -o table --show-suppressed
'''

[deps.install_requirements]
auto = true
sources = ["requirements.txt", "tests/unit/requirements.txt"]
outputs = [".venv/.requirements.installed"]
run = """
uv pip install --upgrade pip
uv pip install -r requirements.txt
uv pip install -r tests/unit/requirements.txt
uv pip install "${HORIZON_ANSIBLE_SPEC:-ansible-core>=2.15,<2.21}"
touch .venv/.requirements.installed
"""

[tasks.install_init_deps_doc]
description = "Quick mise command to install dependencies"
run = """
set -eu

uv pip install antsibull-docs sphinx sphinx-ansible-theme
ansible-galaxy collection install . --force
"""

[tasks.docs_init]
description = "Build collection documentation"
depends = ["install_init_deps_doc"]
run = """
set -eu

antsibull-docs sphinx-init --use-current --squash-hierarchy \
  --dest-dir=docs/ --project "Horizon Ansible" \
  --title "Horizon Ansible Documentation" evertrust.horizon
"""

[tasks.docs_build]
description = "Generate, reformat, and build the collection documentation"
depends = ["docs_init"]
run = """
set -eu

uv pip install -r ./docs/requirements.txt

cd docs
mkdir -p rst
chmod og-w rst
antsibull-docs \
  --config-file antsibull-docs.cfg \
  collection \
  --cleanup everything \
  --use-current \
  --squash-hierarchy \
  --dest-dir rst \
  evertrust.horizon
python reformat.py
sphinx-build -M html rst build -c . -W --keep-going
"""

[tasks.build]
description = "Build artifact"
depends = [ "clean" ]
run = "ansible-galaxy collection build --output-path=build/"

[tasks._install_artifact]
description = "Install the single collection artifact already present in build/"
hide = true
run = """
set -eu

set -- build/*.tar.gz
if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
  echo "Expected exactly one collection artifact in build/, got $#" >&2
  exit 1
fi

echo "$1"
ansible-galaxy collection install "$1" --force
"""

[tasks.install]
description = "Build and install the collection artifact"
depends = [ "build" ]
run = [{ task = "_install_artifact" }]

[tasks.release_check]
description = "Build once and run local unit, sanity, and single-image Horizon tests"
depends = ["build"]
run = [
  { task = "_install_artifact" },
  { task = "_unit_test" },
  { task = "_sanity_test" },
  { task = "container_integration_test" },
]

[tasks.clean]
description = "Clean build artifacts"
run = "rm -f build/*.tar.gz"

[tasks.publish]
description = "Publish build artifact to Ansible Galaxy"
run = """
set -eu

: "${ANSIBLE_GALAXY_API_TOKEN:?ANSIBLE_GALAXY_API_TOKEN is required}"

token_file="$(mktemp)"
trap 'rm -f "$token_file"' EXIT
chmod 600 "$token_file"
printf 'token: %s\n' "$ANSIBLE_GALAXY_API_TOKEN" > "$token_file"

export ANSIBLE_GALAXY_TOKEN_PATH="$token_file"

set -- build/*.tar.gz
if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
  echo "Expected exactly one collection artifact in build/, got $#" >&2
  exit 1
fi

ansible-galaxy collection publish "$1"
"""

[tasks.test]
description = "Build, install, and run all tests"
depends = ["install"]
run = [
  { task = "_unit_test" },
  { task = "_integration_test" },
]

[tasks._integration_test]
description = "Run integration tests against Horizon"
hide = true
run = """
set -eu

: "${HORIZON_ENDPOINT:?HORIZON_ENDPOINT is required}"
: "${HORIZON_API_ID:?HORIZON_API_ID is required}"
: "${HORIZON_API_KEY:?HORIZON_API_KEY is required}"

collection_dir="$HOME/.ansible/collections/ansible_collections/evertrust/horizon"
config_path="$collection_dir/tests/integration/integration_config.yml"

umask 077
rm -f "$config_path"
trap 'rm -f "$config_path"' EXIT HUP INT TERM

python - "$config_path" <<'PY'
import json
import os
import sys

with open(sys.argv[1], "x", encoding="utf-8") as config:
    json.dump(
        {
            "endpoint": os.environ["HORIZON_ENDPOINT"],
            "x_api_id": os.environ["HORIZON_API_ID"],
            "x_api_key": os.environ["HORIZON_API_KEY"],
        },
        config,
    )
    config.write("\\n")
PY

cd "$collection_dir"
ansible-test integration
"""

[tasks.integration_test]
description = "Build, install, and run integration tests"
depends = [ "install" ]
run = [{ task = "_integration_test" }]

[tasks.container_integration_test]
description = "Test the SDK-backed collection against one licensed Horizon container"
depends = ["build"]
run = [{ task = "container_integration_test_artifact" }]

[tasks.container_integration_test_artifact]
description = "Test an existing collection artifact against one licensed Horizon container"
run = """
set -eu

: "${HORIZON_LICENSE_PATH:?HORIZON_LICENSE_PATH is required}"
HORIZON_IMAGE="${HORIZON_IMAGE:-quay.io/evertrust/horizon:2.10.3@sha256:ee768f89889332b1aedb9497db4ecaad11df7bc0ad8805b36423a3fa4786c981}"
HORIZON_SDK_VERSION="${HORIZON_SDK_VERSION:-2.10.0.post1}"

case "$HORIZON_SDK_VERSION" in
  2.8.0.post1)
    sdk_requirement='Anto-test-hrz @ https://test-files.pythonhosted.org/packages/50/05/18722c50b6e89729d463b977bbab94dd9929cca8952dba94dd8e545187b3/anto_test_hrz-2.8.0.post1-py3-none-any.whl#sha256=f8c41f73cb0c2e8f680b35a3bd424aaaf9a071250c13bb800761ecd06c8a5778'
    ;;
  2.9.0)
    sdk_requirement='Anto-test-hrz @ https://files.pythonhosted.org/packages/25/b4/4abecb124d00f3f7015b87d41607765a3787bbfb9835d92a9a35405404f1/anto_test_hrz-2.9.0-py3-none-any.whl#sha256=964e3994ac8dfdd489aec072fb6e57913e957e15a69c7e4835261d76bf19b11f'
    ;;
  2.10.0.post1)
    sdk_requirement='Anto-test-hrz @ https://test-files.pythonhosted.org/packages/44/ca/89926f98dab1ecc15e3151a0e3b9978df0916071bec9437b141ec4417cb0/anto_test_hrz-2.10.0.post1-py3-none-any.whl#sha256=4be5adce9e84801ac855b52a8b43dad1e18e9676ec825f761042b84dad7ab27f'
    ;;
  *)
    echo "Unsupported HORIZON_SDK_VERSION: $HORIZON_SDK_VERSION" >&2
    exit 2
    ;;
esac

uv pip install --require-hashes -r tests/integration/requirements.lock
uv pip install --no-deps --require-hashes "$sdk_requirement"
uv pip check
python - "$HORIZON_SDK_VERSION" <<'PY'
from importlib.metadata import version
import sys

installed = version("Anto-test-hrz")
if installed != sys.argv[1]:
    raise SystemExit("Expected Anto-test-hrz %s, found %s" % (sys.argv[1], installed))
print("Horizon SDK: Anto-test-hrz %s" % installed)
PY

docker pull "$HORIZON_IMAGE"
left_braces='{'
left_braces="$left_braces{"
right_braces='}'
right_braces="$right_braces}"
inspect_format="Resolved Horizon image ID: ${left_braces}.Id${right_braces}; repo digests: ${left_braces}json .RepoDigests${right_braces}"
docker image inspect --format "$inspect_format" "$HORIZON_IMAGE"

set -- build/*.tar.gz
if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
  echo "Expected exactly one collection artifact in build/, got $#" >&2
  exit 1
fi

python tests/integration/run_horizon_matrix.py \
  --license "$HORIZON_LICENSE_PATH" \
  --artifact "$1" \
  --image "$HORIZON_IMAGE"
"""

[tasks._unit_test]
description = "Run unit tests without integration credentials"
hide = true
run = """
set -eu
if [ -n "${HORIZON_ANSIBLE_SPEC:-}" ]; then
  uv pip install "$HORIZON_ANSIBLE_SPEC"
fi
python_interpreter="$VIRTUAL_ENV/bin/python"
cd "$HOME/.ansible/collections/ansible_collections/evertrust/horizon"
ansible-test units --python-interpreter "$python_interpreter"
"""

[tasks._sanity_test]
description = "Run Ansible sanity tests against the installed collection"
hide = true
run = """
set -eu
python_version="$(python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
cd "$HOME/.ansible/collections/ansible_collections/evertrust/horizon"
ansible-test sanity --python "$python_version" --color yes
"""

[tasks.unit_test]
description = "Build, install, and run unit tests"
depends = [ "install" ]
run = [{ task = "_unit_test" }]

[tasks.sanity_test]
description = "Build, install, and run Ansible sanity tests"
depends = [ "install" ]
run = [{ task = "_sanity_test" }]

[tasks.sanity_test_artifact]
description = "Install and sanity-test the single artifact already present in build/"
run = [
  { task = "_install_artifact" },
  { task = "_sanity_test" },
]

[tasks.static_test_artifact]
description = "Install and run unit and sanity tests against an existing artifact"
run = [
  { task = "_install_artifact" },
  { task = "_unit_test" },
  { task = "_sanity_test" },
]

[tasks.static_test]
description = "Build, install, and run unit and Ansible sanity tests"
depends = [ "install" ]
run = [
  { task = "_unit_test" },
  { task = "_sanity_test" },
]
