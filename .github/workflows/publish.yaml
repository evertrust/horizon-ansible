---
name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: Build and statically verify release artifact
    runs-on: runs-on=${{ github.run_id }}/runner=evertrust
    timeout-minutes: 30
    steps:
      - name: Configure Runs-On
        uses: runs-on/action@4e5f72399b6b17f2e79c511c1b38a315a64d22dc # v2.2.0

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Configure mise-en-place
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Build the release artifact once
        run: mise run build

      - name: Run unit and sanity tests against the release artifact
        run: mise run static_test_artifact

      - name: Upload the release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: horizon-collection
          path: build/*.tar.gz
          if-no-files-found: error

  compatibility:
    name: SDK ${{ matrix.sdk }} / Horizon ${{ matrix.horizon }}
    needs: build
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - "2.8.0"
          - "2.9.0"
          - "2.10.0"
        image:
          - quay.io/evertrust/horizon:2.8.10@sha256:d9181a2e9b372ac7e2955cc29142db1711084deeca86c415229e06cd42e11eec
          - quay.io/evertrust/horizon:2.9.4@sha256:a1c79cea6183092e31033054cb46d88aa808d2f87458ff82cf4527a5b3b50fec
          - quay.io/evertrust/horizon:2.10.4@sha256:dc19d51551453a94fc1ef3c99b6c68f15b41f7fd19ab546f4ac184022e9aa9a9
        include:
          - image: quay.io/evertrust/horizon:2.8.10@sha256:d9181a2e9b372ac7e2955cc29142db1711084deeca86c415229e06cd42e11eec
            horizon: "2.8.10"
          - image: quay.io/evertrust/horizon:2.9.4@sha256:a1c79cea6183092e31033054cb46d88aa808d2f87458ff82cf4527a5b3b50fec
            horizon: "2.9.4"
          - image: quay.io/evertrust/horizon:2.10.4@sha256:dc19d51551453a94fc1ef3c99b6c68f15b41f7fd19ab546f4ac184022e9aa9a9
            horizon: "2.10.4"
    runs-on: runs-on=${{ github.run_id }}/runner=evertrust
    timeout-minutes: 60
    env:
      HORIZON_IMAGE: ${{ matrix.image }}
      HORIZON_SDK_VERSION: ${{ matrix.sdk }}
    steps:
      - name: Configure Runs-On
        uses: runs-on/action@4e5f72399b6b17f2e79c511c1b38a315a64d22dc # v2.2.0

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download the release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: horizon-collection
          path: build

      - name: Configure mise-en-place
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Fetch Horizon test infrastructure secrets via Vault
        uses: hashicorp/vault-action@9c2d817b85b9fff56bcab21cb74b485aee9e9d73 # v2.8.1
        with:
          url: ${{ vars.VAULT_ADDR }}
          method: ${{ vars.VAULT_AUTH_METHOD }}
          path: ${{ vars.VAULT_AUTH_PATH }}
          secrets: |
            ci/data/repositories/evertrust/horizon-ansible/quay username | QUAY_USER ;
            ci/data/repositories/evertrust/horizon-ansible/quay password | QUAY_TOKEN ;
            ci/data/repositories/evertrust/horizon-ansible/horizon licence | HORIZON_LICENCE ;

      - name: Log in to Quay registry
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: quay.io
          username: ${{ env.QUAY_USER }}
          password: ${{ env.QUAY_TOKEN }}

      - name: Materialize Horizon licence
        shell: bash
        env:
          HORIZON_LICENCE: ${{ env.HORIZON_LICENCE }}
        run: |
          set -euo pipefail
          license_path="$RUNNER_TEMP/horizon-license.txt"
          umask 077
          printf '%s' "$HORIZON_LICENCE" > "$license_path"
          echo "HORIZON_LICENSE_PATH=$license_path" >> "$GITHUB_ENV"

      - name: Run licensed compatibility test
        run: mise run container_integration_test_artifact

      - name: Capture resolved Python environment
        if: always()
        shell: bash
        run: |
          mkdir -p tests/output
          uv pip freeze > "tests/output/sdk-${HORIZON_SDK_VERSION}-horizon-${{ matrix.horizon }}-freeze.txt"

      - name: Upload Ansible, Horizon, and environment logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: horizon-sdk-${{ matrix.sdk }}-horizon-${{ matrix.horizon }}-logs
          path: tests/output/*
          if-no-files-found: warn

      - name: Remove Horizon licence
        if: always()
        run: rm -f "$RUNNER_TEMP/horizon-license.txt"

  publish:
    name: Publish verified artifact
    needs: compatibility
    runs-on: runs-on=${{ github.run_id }}/runner=evertrust
    timeout-minutes: 15
    steps:
      - name: Configure Runs-On
        uses: runs-on/action@4e5f72399b6b17f2e79c511c1b38a315a64d22dc # v2.2.0

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download the verified release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: horizon-collection
          path: build

      - name: Configure mise-en-place
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Fetch Horizon test infrastructure secrets via Vault
        uses: hashicorp/vault-action@9c2d817b85b9fff56bcab21cb74b485aee9e9d73 # v2.8.1
        with:
          url: ${{ vars.VAULT_ADDR }}
          method: ${{ vars.VAULT_AUTH_METHOD }}
          path: ${{ vars.VAULT_AUTH_PATH }}
          secrets: |
            ci/data/repositories/evertrust/horizon-ansible/ansible-galaxy api_token | ANSIBLE_GALAXY_API_TOKEN ;

      - name: Publish collection
        run: mise run publish
        env:
          ANSIBLE_GALAXY_API_TOKEN: ${{ env.ANSIBLE_GALAXY_API_TOKEN }}
