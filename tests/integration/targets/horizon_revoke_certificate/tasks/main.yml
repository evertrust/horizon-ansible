- name: Enroll an isolated certificate fixture for authenticated revocation
  no_log: true
  evertrust.horizon.horizon_enroll:
    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"
    profile: "Ansible"
    mode: "centralized"
    key_type: "rsa-2048"
    subject:
      cn.1: "IntegrationTestCI-revoke-authenticated"
  register: authenticated_revoke_fixture

- name: Revoke the authenticated certificate
  no_log: true
  evertrust.horizon.horizon_revoke:
    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"
    certificate_pem: "{{ authenticated_revoke_fixture.certificate.certificate }}"
    revocation_reason: "unspecified"
  register: authenticated_revoke_result

- name: Verify authenticated revocation returned certificate data
  ansible.builtin.assert:
    that:
      - authenticated_revoke_result.certificate is mapping
      - authenticated_revoke_result.certificate.certificate | length > 0

- name: Revoke the already revoked certificate
  no_log: true
  evertrust.horizon.horizon_revoke:
    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"
    certificate_pem: "{{ authenticated_revoke_fixture.certificate.certificate }}"
    revocation_reason: "unspecified"
  ignore_errors: true
  register: already_revoked_result

- name: Verify duplicate revocation is rejected
  ansible.builtin.assert:
    that:
      - already_revoked_result is failed
      - "'Certificate is already revoked' in already_revoked_result.msg"

- name: Enroll an isolated certificate fixture for proof-of-possession revocation
  no_log: true
  evertrust.horizon.horizon_enroll:
    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"
    profile: "Ansible"
    mode: "centralized"
    key_type: "rsa-2048"
    subject:
      cn.1: "IntegrationTestCI-revoke-pop"
  register: pop_revoke_fixture

- name: Revoke a certificate using proof of possession
  no_log: true
  evertrust.horizon.horizon_revoke:
    endpoint: "{{ endpoint }}"
    certificate_pem: "{{ pop_revoke_fixture.certificate.certificate }}"
    private_key: "{{ pop_revoke_fixture.key }}"
    revocation_reason: "unspecified"
  register: pop_revoke_result

- name: Verify proof-of-possession revocation returned certificate data
  ansible.builtin.assert:
    that:
      - pop_revoke_result.certificate is mapping
      - pop_revoke_result.certificate.certificate | length > 0
