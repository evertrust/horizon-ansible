- name: Enroll a centralized certificate with policy fields
  no_log: true
  evertrust.horizon.horizon_enroll:

    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"

    profile: "Ansible"
    mode: "centralized"
    key_type: "rsa-2048"

    subject:
      cn.1: "IntegrationTestCI"
      o.1: "Evertrust"
      ou.1: "R&D"
    sans:
      dnsname:
        - "AnsibleTest"
        - "dns2"
      rfc822name: "adu@evertrust.fr"
    labels:
      label-1: "test"
      label-2: "ansible"

    team: "TeamA"

  register: centralized_enroll_result

- name: Read the centralized certificate back from Horizon
  no_log: true
  ansible.builtin.set_fact:
    centralized_certificate_lookup: >-
      {{ lookup('evertrust.horizon.horizon_lookup', endpoint=endpoint,
                x_api_id=x_api_id, x_api_key=x_api_key,
                certificate_pem=centralized_enroll_result.certificate.certificate,
                fields=['profile', 'team', 'labels'], wantlist=True) }}

- name: Verify centralized enrollment profile, team, and labels
  vars:
    centralized_certificate: >-
      {{ centralized_certificate_lookup
         if centralized_certificate_lookup is mapping
         else centralized_certificate_lookup[0] }}
  ansible.builtin.assert:
    that:
      - centralized_certificate.profile == "Ansible"
      - centralized_certificate.team == "TeamA"
      - centralized_certificate.labels['label-1'] == "test"
      - centralized_certificate.labels['label-2'] == "ansible"

- name: Enroll with an unknown profile
  no_log: true
  evertrust.horizon.horizon_enroll:

    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"

    profile: "InexistantProfile"
    mode: "centralized"
    key_type: "rsa-2048"

    subject:
      cn.1: "TestWithoutProfile"
    sans:
      dnsname: "TestWithoutProfile"
    labels:
      label-1: "test"
      label-2: "ansible"

  ignore_errors: true
  register: unknown_profile_result

- name: Verify an unknown profile is rejected
  ansible.builtin.assert:
    that:
      - unknown_profile_result is failed
      - "'Profile does not exist or is disabled' in unknown_profile_result.msg"


- name: Enroll with an unsupported key type
  no_log: true
  evertrust.horizon.horizon_enroll:

    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"

    profile: "Ansible"
    mode: "centralized"
    key_type: "WrongKeyType-1234"

    subject:
      cn.1: "TestWithWrongKeyType"
    sans:
      dnsname: "TestWithWrongKeyType"
    labels:
      label-1: "test"
      label-2: "ansible"

  ignore_errors: true
  register: unsupported_key_type_result

- name: Verify an unsupported key type is rejected
  ansible.builtin.assert:
    that:
      - unsupported_key_type_result is failed
      - "'Unknown algorithm' in unsupported_key_type_result.msg"


- name: Enroll with an unknown label
  no_log: true
  evertrust.horizon.horizon_enroll:

    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"

    profile: "Ansible"
    mode: "centralized"
    key_type: "rsa-2048"

    subject:
      cn.1: "TestCIWithUnexistantLabel"
    sans:
      dnsname: "TestCIWithUnexistantLabel"
    labels:
      unknown-label: "test"
      label-1: "test"
      label-2: "ansible"

  ignore_errors: true
  register: unknown_label_result

- name: Verify an unknown label is rejected
  ansible.builtin.assert:
    that:
      - unknown_label_result is failed
      - "'Label element' in unknown_label_result.msg"
      - "'is not authorized' in unknown_label_result.msg"
