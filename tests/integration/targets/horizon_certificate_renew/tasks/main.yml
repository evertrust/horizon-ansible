- name: Enroll a fixture for authenticated centralized renewal
  no_log: true
  evertrust.horizon.horizon_enroll:
    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"
    profile: "Ansible"
    mode: "centralized"
    key_type: "rsa-2048"
    subject:
      cn.1: "IntegrationTestCI-certificate-to-renew"
  register: centralized_renew_fixture

- name: Renew using authenticated centralized mode
  no_log: true
  evertrust.horizon.horizon_renew:
    endpoint: "{{ endpoint }}"
    x_api_id: "{{ x_api_id }}"
    x_api_key: "{{ x_api_key }}"
    certificate_id: "{{ centralized_renew_fixture.certificate._id }}"
  register: centralized_renew_result

- name: Verify authenticated centralized renewal returned certificate data
  ansible.builtin.assert:
    that:
      - centralized_renew_result.certificate is mapping
      - centralized_renew_result.certificate.certificate | length > 0

