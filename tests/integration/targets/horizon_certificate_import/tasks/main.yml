- name: Create an isolated directory for import fixtures
  delegate_to: localhost
  ansible.builtin.tempfile:
    state: directory
    suffix: horizon-certificate-import
  register: import_test_directory

- name: Exercise certificate import workflows
  block:
    - name: Run isolated import test cases
      ansible.builtin.include_tasks: test_cases.yml
  always:
    - name: Remove isolated import fixtures
      no_log: true
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ import_test_directory.path }}"
        state: absent
